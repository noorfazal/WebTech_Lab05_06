<!DOCTYPE html>
<html>
<head>
    <title>Holy Grail - Center Header</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Arial, sans-serif;
        }

        body {
            display: grid;
            grid-template-areas: 
                "header header header"
                "nav main aside"
                "footer footer footer";
            grid-template-columns: 220px 1fr 220px;
            grid-template-rows: 70px 1fr 60px;
            min-height: 100vh;
            gap: 12px;
            padding: 15px;
            background: #f8fafc;
        }

        header { 
            grid-area: header; 
            background: #fef9c3;
            color: #854d0e;
            padding: 20px;
            border-radius: 12px;
            font-size: 1.5rem;
            font-weight: bold;
            box-shadow: 0 2px 8px rgba(250,204,21,0.1);
            border: 1px solid #fde047;
            text-align: center;  /* Center text */
            display: flex;
            align-items: center;
            justify-content: center;
        }

        nav { 
            grid-area: nav; 
            background: #dbeafe;
            color: #1e40af;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(56,189,248,0.1);
            border: 1px solid #93c5fd;
        }

        main { 
            grid-area: main; 
            background: #dcfce7;
            color: #166534;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(74,222,128,0.1);
            border: 1px solid #86efac;
        }

        aside { 
            grid-area: aside; 
            background: #ffe4e6;
            color: #9f1239;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(248,113,113,0.1);
            border: 1px solid #fda4af;
        }

        footer { 
            grid-area: footer; 
            background: #f3e8ff;
            color: #6b21a8;
            padding: 20px;
            text-align: center;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(192,132,252,0.1);
            border: 1px solid #d8b4fe;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Responsive */
        @media (max-width: 768px) {
            body {
                grid-template-areas: 
                    "header"
                    "nav"
                    "main"
                    "aside"
                    "footer";
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

    <header>✨ HEADER</header>
    <nav>📌 LEFT NAV</nav>
    <main>📄 MAIN CONTENT</main>
    <aside>📎 RIGHT SIDEBAR</aside>
    <footer>📋 FOOTER</footer>

</body>
</html>
